<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - FundFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --indigo: #4f46e5;
        --indigo-dark: #3730a3;
        --indigo-light: #eef2ff;
        --blue-soft: #dbeafe;
      }
      body {
        font-family: "DM Sans", sans-serif;
      }
      .font-display {
        font-family: "Fraunces", serif;
      }

      /* Animations */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.6s ease forwards;
      }
      .fade-up-d1 {
        animation: fadeUp 0.6s 0.1s ease both;
      }
      .fade-up-d2 {
        animation: fadeUp 0.6s 0.2s ease both;
      }
      .fade-up-d3 {
        animation: fadeUp 0.6s 0.3s ease both;
      }

      /* Hero gradient bg */
      .hero-bg {
        background: linear-gradient(
          135deg,
          #eef2ff 0%,
          #dbeafe 50%,
          #ede9fe 100%
        );
      }

      /* Input focus */
      .register-input:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
      }

      /* Success message */
      .success-message {
        display: none;
        animation: fadeUp 0.5s ease;
      }
    </style>
  </head>
  <body class="bg-white">
    <!-- ========== HEADER ========== -->
    <header
      class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <a href="/" class="text-2xl font-bold text-indigo-600 font-display"
            >FundFlow</a
          >
          <div class="flex items-center space-x-4">
            <a
              href="/"
              class="text-gray-600 hover:text-indigo-600 text-sm font-medium"
              >Back to Home</a
            >
            <a
              href="/"
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors"
              >Sign In</a
            >
          </div>
        </div>
      </div>
    </header>

    <!-- ========== REGISTRATION PAGE ========== -->
    <div class="hero-bg min-h-screen py-16 px-4 sm:px-6 lg:px-8">
      <div class="max-w-md mx-auto">
        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8 fade-up">
          <!-- Header -->
          <div class="text-center mb-8">
            <h1 class="font-display text-3xl font-bold text-gray-900 mb-2">
              Create Account
            </h1>
            <p class="text-gray-600">
              Join FundFlow and start your fundraising journey
            </p>
          </div>

          <!-- Form -->
          <form id="registerForm" class="space-y-4" method="post" action="/register">
            <!-- Full Name -->
            <div class="fade-up-d1">
              <label
                for="name"
                class="block text-sm font-semibold text-gray-700 mb-2"
                >Full Name</label
              >
              <input
                type="text"
                id="name"
                name="name"
                placeholder="John Doe"
                required
                class="register-input w-full px-4 py-3 border border-gray-200 rounded-lg text-gray-900 placeholder-gray-400 transition-colors"
              />
            </div>

            <!-- Email -->
            <div class="fade-up-d1">
              <label
                for="email"
                class="block text-sm font-semibold text-gray-700 mb-2"
                >Email Address</label
              >
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                required
                class="register-input w-full px-4 py-3 border border-gray-200 rounded-lg text-gray-900 placeholder-gray-400 transition-colors"
              />
            </div>

            <!-- Password -->
            <div class="fade-up-d2">
              <label
                for="password"
                class="block text-sm font-semibold text-gray-700 mb-2"
                >Password</label
              >
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Create a strong password"
                required
                class="register-input w-full px-4 py-3 border border-gray-200 rounded-lg text-gray-900 placeholder-gray-400 transition-colors"
              />
            </div>

            <!-- Confirm Password -->
            <div class="fade-up-d2">
              <label
                for="confirmPassword"
                class="block text-sm font-semibold text-gray-700 mb-2"
                >Confirm Password</label
              >
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Confirm your password"
                required
                class="register-input w-full px-4 py-3 border border-gray-200 rounded-lg text-gray-900 placeholder-gray-400 transition-colors"
              />
            </div>

            <!-- Role Selection -->
            <div class="fade-up-d2">
              <label
                for="role"
                class="block text-sm font-semibold text-gray-700 mb-2"
                >Select Your Role</label
              >
              <select
                id="role"
                name="role"
                required
                class="register-input w-full px-4 py-3 border border-gray-200 rounded-lg text-gray-900 transition-colors"
              >
                <option value="">Choose a role...</option>
                <option value="donor">Donor</option>
                <option value="creator">Creator</option>
              </select>
            </div>

            <!-- Terms & Conditions -->
            <div class="fade-up-d3 flex items-start space-x-3">
              <input
                type="checkbox"
                id="terms"
                name="terms"
                required
                class="mt-1 h-4 w-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer"
              />
              <label for="terms" class="text-sm text-gray-600">
                I agree to the
                <a
                  href="#"
                  class="text-indigo-600 hover:text-indigo-700 font-semibold"
                  >Terms & Conditions</a
                >
                and
                <a
                  href="#"
                  class="text-indigo-600 hover:text-indigo-700 font-semibold"
                  >Privacy Policy</a
                >
              </label>
            </div>

            <!-- Error Message -->
            <div
              id="errorMessage"
              class="hidden p-4 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm"
            ></div>

            <!-- Success Message -->
            <div
              id="successMessage"
              class="success-message p-4 bg-green-50 border border-green-200 rounded-lg text-green-600 text-sm"
            ></div>

            <!-- Submit Button -->
            <button
              type="submit"
              class="fade-up-d3 w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg font-semibold transition-colors shadow-lg shadow-indigo-200 mt-6"
            >
              Create Account
            </button>

            <!-- Sign In Link -->
            <p class="text-center text-sm text-gray-600 mt-4">
              Already have an account?
              <a
                href="/"
                class="text-indigo-600 hover:text-indigo-700 font-semibold"
                >Sign in</a
              >
            </p>
          </form>
        </div>

        <!-- Features Mini Section -->
        <div class="mt-12 text-center fade-up-d3">
          <p class="text-gray-600 text-sm mb-6">
            Join thousands of creators already fundraising on FundFlow
          </p>
          <div class="grid grid-cols-3 gap-4">
            <div class="text-center">
              <div class="text-2xl font-bold text-indigo-600">50K+</div>
              <div class="text-xs text-gray-500 mt-1">Creators</div>
            </div>
            <div class="text-center">
              <div class="text-2xl font-bold text-indigo-600">$2B+</div>
              <div class="text-xs text-gray-500 mt-1">Raised</div>
            </div>
            <div class="text-center">
              <div class="text-2xl font-bold text-indigo-600">180+</div>
              <div class="text-xs text-gray-500 mt-1">Countries</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const errorDiv = document.getElementById("errorMessage");
          const successDiv = document.getElementById("successMessage");
          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;
          const role = document.getElementById("role").value;
          const terms = document.getElementById("terms").checked;

          // Reset messages
          errorDiv.classList.add("hidden");
          successDiv.classList.add("hidden");

          // Validation
          if (!name || !email || !password || !confirmPassword || !role) {
            errorDiv.textContent = "Please fill in all required fields";
            errorDiv.classList.remove("hidden");
            return;
          }

          if (password !== confirmPassword) {
            errorDiv.textContent = "Passwords do not match";
            errorDiv.classList.remove("hidden");
            return;
          }

          if (password.length < 6) {
            errorDiv.textContent = "Password must be at least 6 characters";
            errorDiv.classList.remove("hidden");
            return;
          }

          if (!terms) {
            errorDiv.textContent = "Please accept the terms and conditions";
            errorDiv.classList.remove("hidden");
            return;
          }

          try {
            const response = await fetch("/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name, email, password, role }),
            });

            const result = await response.json();

            if (!response.ok) {
              errorDiv.textContent =
                result.error || "Registration failed. Please try again.";
              errorDiv.classList.remove("hidden");
              return;
            }

            // Success
            successDiv.style.display = "";
            successDiv.textContent =
              "✓ Account created successfully! Redirecting...";
            successDiv.classList.remove("hidden");

            document.getElementById("registerForm").reset();

            // Redirect after 2 seconds
            setTimeout(() => {
              window.location.href = "/";
            }, 2000);
          } catch (error) {
            errorDiv.textContent = "An error occurred. Please try again.";
            errorDiv.classList.remove("hidden");
          }
        });
    </script>
  </body>
</html>
