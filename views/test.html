<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page - FundFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-50">
    <header class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <h1 class="text-2xl font-bold text-indigo-600">FundFlow</h1>
                <a href="/logout" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                    Logout
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="bg-white rounded-2xl shadow-xl p-8 fade-up">
            <h2 class="text-3xl font-bold text-gray-900 mb-4">Welcome to FundFlow!</h2>
            <p class="text-gray-600 mb-6">You are successfully logged in.</p>
            
            <div id="userInfo" class="bg-indigo-50 border border-indigo-200 rounded-lg p-6 mb-6">
                <h3 class="text-lg font-semibold text-indigo-900 mb-4">Your Information:</h3>
                <div id="info" class="space-y-2">
                    <p class="text-indigo-800">Loading user information...</p>
                </div>
            </div>

            <div class="space-y-4">
                <a href="/" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-semibold transition-colors">
                    Back to Home
                </a>
            </div>
        </div>
    </main>

    <script>
        // Fetch user info from auth-status
        async function loadUserInfo() {
            try {
                const response = await fetch("/auth-status");
                const data = await response.json();
                
                if (data.authenticated && data.user) {
                    const user = data.user;
                    const infoDiv = document.getElementById("info");
                    infoDiv.innerHTML = `
                        <p><strong class="text-indigo-900">Name:</strong> <span class="text-indigo-700">${user.name}</span></p>
                        <p><strong class="text-indigo-900">Email:</strong> <span class="text-indigo-700">${user.email}</span></p>
                        <p><strong class="text-indigo-900">Role:</strong> <span class="text-indigo-700 capitalize">${user.role}</span></p>
                    `;
                } else {
                    window.location.href = "/";
                }
            } catch (error) {
                console.error("Error loading user info:", error);
                window.location.href = "/";
            }
        }

        // Load user info when page loads
        document.addEventListener("DOMContentLoaded", loadUserInfo);
    </script>
</body>
</html>
